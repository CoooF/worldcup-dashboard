# ============================================================
# Nginx 反向代理配置 - 2026 世界杯数据看板
# 用途：把 80/443 端口转发到 Node.js 的 3000 端口，并配置 HTTPS
#
# 部署步骤：
# 1. sudo cp nginx.conf /etc/nginx/sites-available/worldcup
# 2. 把下面的 your-domain.com 改成你的域名（或服务器 IP）
# 3. sudo ln -s /etc/nginx/sites-available/worldcup /etc/nginx/sites-enabled/
# 4. sudo nginx -t  （测试配置）
# 5. sudo systemctl reload nginx
# 6. （可选）HTTPS：sudo certbot --nginx -d your-domain.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # ← 改成你的域名或 IP

    # 如需 HTTPS，certbot 会自动加 443 配置，无需手动写

    # 反向代理到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # API 请求不缓冲（实时数据）
        location /api/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_buffering off;
            proxy_read_timeout 30s;
        }
    }

    # 静态资源缓存（前端 CSS/JS）
    location ~* \.(css|js|png|jpg|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # 上传/请求体大小
    client_max_body_size 10m;
}
